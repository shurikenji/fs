<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Shupremium</title>
    <meta name="csrf-token" content="{{ csrf_token(request) }}">
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text-primary);
        }
        .login-wrapper {
            width: min(92vw, 440px);
            animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-8);
            box-shadow: var(--shadow-lg);
        }
        .login-brand {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            margin-bottom: var(--space-6);
        }
        .login-brand__mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            background: var(--accent);
            color: var(--text-inverse);
            box-shadow: var(--shadow-accent);
        }
        .login-brand__title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .login-brand__sub {
            font-size: 12px;
            color: var(--text-tertiary);
            font-weight: 500;
        }
        .login-title {
            margin: 0 0 var(--space-2);
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.03em;
        }
        .login-desc {
            margin: 0 0 var(--space-6);
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }
        .login-form { display: grid; gap: var(--space-4); }
        .login-input {
            width: 100%;
            height: 48px;
            padding: 0 var(--space-4);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            outline: none;
            background: var(--surface);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 15px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .login-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(0, 173, 181, 0.10);
        }
        .login-btn {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--accent);
            color: var(--text-inverse);
            font-family: var(--font-sans);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow-accent);
            transition: all 0.18s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .login-btn:hover {
            background: var(--accent-hover);
            box-shadow: var(--shadow-accent-lg);
            transform: translateY(-1px);
        }
        .login-error {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-3) var(--space-4);
            border: 1px solid var(--danger-border);
            border-radius: var(--radius-sm);
            background: var(--danger-bg);
            color: var(--danger);
            font-size: 14px;
            font-weight: 500;
        }
        .login-footer {
            margin-top: var(--space-5);
            text-align: center;
            color: var(--text-tertiary);
            font-size: 12px;
        }
        .login-footer a { color: var(--text-accent); }
    </style>
</head>
<body class="app-body">
    <div class="app-glow app-glow--one"></div>
    <div class="app-glow app-glow--two"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-brand">
                <span class="login-brand__mark">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9"></path>
                    </svg>
                </span>
                <span>
                    <div class="login-brand__title">Platform Control</div>
                    <div class="login-brand__sub">Shupremium Admin</div>
                </span>
            </div>

            <h1 class="login-title">Đăng nhập</h1>
            <p class="login-desc">Control plane duy nhất cho proxy runtime, service registry, và portal modules.</p>

            {% if error %}
            <div class="login-error">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/control/login" class="login-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
                <input class="login-input" type="password" name="password" placeholder="Mật khẩu quản trị" required autofocus>
                <button class="login-btn" type="submit">Đăng nhập</button>
            </form>
        </div>
        <div class="login-footer">
            <a href="/">shupremium.com</a> · admin.shupremium.com
        </div>
    </div>
</body>
</html>
