<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shupremium{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%2300ADB5'/%3E%3Cpath d='M16 32h32M32 16l16 16-16 16' stroke='white' stroke-width='5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}?v=20260404-2">
    {% block head %}{% endblock %}
</head>

<body class="app-body" x-data="{ mobileNav: false }">
    <div class="app-glow app-glow--one"></div>
    <div class="app-glow app-glow--two"></div>

    <header class="site-header" :class="{ 'nav-open': mobileNav }">
        <div class="site-header__inner">
            <a href="/" class="site-logo">
                <span class="site-logo__mark">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                            d="M3 12h18M12 3l9 9-9 9" />
                    </svg>
                </span>
                <span class="site-logo__text">Shupremium</span>
            </a>

            <nav class="site-nav" :class="{ 'is-open': mobileNav }">
                <a href="/" class="site-nav__link {% if request.url.path == '/' %}is-active{% endif %}">Home</a>
                <a href="/pricing"
                    class="site-nav__link {% if request.url.path == '/pricing' %}is-active{% endif %}">Pricing</a>
                <a href="/check"
                    class="site-nav__link {% if request.url.path == '/check' %}is-active{% endif %}">Balance</a>
                <a href="/keys" class="site-nav__link {% if request.url.path == '/keys' %}is-active{% endif %}">Keys</a>
                <a href="/logs" class="site-nav__link {% if request.url.path == '/logs' %}is-active{% endif %}">Logs</a>
            </nav>

            <button type="button" class="nav-toggle" @click="mobileNav = !mobileNav"
                :aria-expanded="mobileNav.toString()" aria-label="Toggle menu">
                <svg x-show="!mobileNav" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                        d="M4 7h16M4 12h16M4 17h16" />
                </svg>
                <svg x-show="mobileNav" x-cloak xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
    </header>

    <main class="site-main">
        <div class="site-container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="site-container">
            <div class="site-footer__inner">
                <span class="site-footer__brand">Shupremium</span>
                <span class="site-footer__copy">AI pricing, balance, and key tools for customers.</span>
            </div>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>

</html>
