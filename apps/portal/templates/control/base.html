<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} - Pricing Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='css/admin.css') }}">
    {% block head %}{% endblock %}
</head>
<body class="admin-body">
    <button class="sidebar-toggle" type="button" onclick="toggleAdminSidebar()" aria-label="Toggle admin sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <div class="sidebar-overlay" onclick="toggleAdminSidebar()"></div>

    <aside class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-brand">
            <div class="logo-mark">PH</div>
            <div>
                <div class="brand-text">Pricing Hub</div>
                <div class="brand-subtext">Admin Console</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-title">Control</div>
                <a class="nav-link {% if request.url.path == '/control' %}active{% endif %}" href="/control">
                    <span class="nav-link__icon">OV</span>
                    <span>Overview</span>
                </a>
                <a class="nav-link {% if request.url.path.startswith('/control/servers') %}active{% endif %}" href="/control/servers">
                    <span class="nav-link__icon">SV</span>
                    <span>Servers</span>
                </a>
                <a class="nav-link {% if request.url.path.startswith('/control/settings') %}active{% endif %}" href="/control/settings">
                    <span class="nav-link__icon">AI</span>
                    <span>Runtime Settings</span>
                </a>
            </div>
        </nav>

        <div class="sidebar-footer">
            <a class="nav-link" href="/control/logout">
                <span class="nav-link__icon">OUT</span>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <main class="admin-main">
        {% if flash_message %}
        <div class="flash-alert">
            <span>{{ flash_message }}</span>
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <script>
        function toggleAdminSidebar() {
            document.getElementById('adminSidebar')?.classList.toggle('open');
            document.querySelector('.sidebar-overlay')?.classList.toggle('active');
        }

        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape') {
                document.getElementById('adminSidebar')?.classList.remove('open');
                document.querySelector('.sidebar-overlay')?.classList.remove('active');
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
