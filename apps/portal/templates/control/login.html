<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập quản trị - Pricing Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='css/admin.css') }}">
</head>
<body class="admin-body">
    <div class="login-shell">
        <section class="login-panel">
            <div class="login-brand">
                <div class="logo-mark">PH</div>
                <div>
                    <div class="brand-text">Pricing Hub</div>
                    <div class="brand-subtext">Admin Console</div>
                </div>
            </div>

            <p class="page-eyebrow">Protected Access</p>
            <h1 class="page-title" style="font-size: clamp(1.8rem, 4vw, 2.6rem);">Đăng nhập khu quản trị</h1>
            <p class="page-subtitle">Khu này tách biệt hoàn toàn với giao diện người dùng.</p>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/control/login" class="mt-4">
                <div class="mb-3">
                    <label class="form-label">Admin secret</label>
                    <input type="password" name="secret" class="form-control" placeholder="Nhập shared secret" required autofocus>
                </div>
                <button type="submit" class="btn-admin w-100">Đăng nhập</button>
            </form>
        </section>
    </div>
</body>
</html>
