<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Balance Checker | Check Your OpenAI Credits</title>
    <meta name="description" content="Check your OpenAI API balance and usage quickly and securely.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        <div class="card">
            <div class="card-header">
                <div class="logo">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="20" r="18" stroke="#00ADB5" stroke-width="2" />
                        <path d="M20 10v20M10 20h20" stroke="#00ADB5" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </div>
                <h1>API Balance Checker</h1>
                <p class="subtitle">Check your API credits</p>
            </div>

            <form id="checkForm" class="form">
                <div class="input-group">
                    <label for="server">Server</label>
                    <select id="server" required>
                        <option value="">Loading servers...</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="apiKey">API Key</label>
                    <div class="input-wrapper">
                        <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxx" autocomplete="off"
                            required>
                        <button type="button" id="toggleKey" class="toggle-btn" aria-label="Toggle visibility">
                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-primary">
                    <span class="btn-text">Check Balance</span>
                    <span class="btn-loader"></span>
                </button>
            </form>

            <div id="result" class="result hidden">
                <div class="result-header">
                    <span class="result-icon success-icon">✓</span>
                    <span class="result-server"></span>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-label">Balance</span>
                        <span class="stat-value balance-value">$0.00</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Used</span>
                        <span class="stat-value usage-value">$0.00</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Limit</span>
                        <span class="stat-value limit-value">$0.00</span>
                    </div>
                </div>

                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                    <span class="progress-text">0% used</span>
                </div>
            </div>

            <div id="error" class="error-box hidden">
                <span class="error-icon">!</span>
                <span class="error-message"></span>
            </div>
        </div>

    </main>

</body>

</html>
